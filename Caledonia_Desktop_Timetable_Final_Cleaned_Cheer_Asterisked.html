<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caledonia Timetable</title>
  <style>
    :root {
      --bg: #000000;
      --grid: #303030;
      --text: #f5f5f5;
      --muted: #cfcfcf;
      --yellow: #f2c200;
      --orange: #f28c28;
      --card: #0f0f0f;
      --header-text: #000000;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }
    .wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    label { font-weight: 700; }
    select {
      background: #111;
      color: #fff;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 16px;
      min-width: 180px;
    }
    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
      color: var(--muted);
    }
    .swatch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .chip {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      display: inline-block;
      border: 1px solid #555;
    }
    .chip.black { background: var(--card); }
    .chip.yellow { background: var(--yellow); }
    .chip.orange { background: var(--orange); }
    .table-scroll {
      overflow-x: auto;
      border: 1px solid var(--grid);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1300px;
      table-layout: fixed;
      background: var(--bg);
    }
    th, td {
      border: 1px solid var(--grid);
      vertical-align: top;
    }
    thead th {
      background: var(--yellow);
      color: var(--header-text);
      font-size: 18px;
      font-weight: 700;
      padding: 14px 10px;
      text-align: center;
    }
    th.time {
      width: 140px;
      background: #111;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      padding: 10px 8px;
      text-align: center;
      vertical-align: middle;
    }
    td.slot {
      background: #050505;
      height: 100px;
      padding: 8px;
    }
    .class-box {
      background: var(--card);
      color: var(--text);
      border: 1px solid #444;
      border-radius: 10px;
      min-height: 82px;
      padding: 9px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }
    .class-box.yellow {
      background: var(--yellow);
      color: #000;
      border-color: var(--yellow);
    }
    .class-box.orange {
      background: var(--orange);
      color: #000;
      border-color: var(--orange);
    }
    .class-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .class-meta {
      font-size: 12px;
      line-height: 1.3;
      opacity: 0.95;
    }
    .empty {
      background: #050505;
    }
    td.company-span {
      background: #050505;
      padding: 8px;
      vertical-align: top;
    }
    .company-box {
      height: calc(83.333% - 2px);
      min-height: 0;
      align-self: stretch;
    }
    td.friday-compact {
      background: #050505;
      padding: 8px;
      vertical-align: top;
    }
    .compact-box {
      min-height: 0;
      height: 100%;
    }
    td.friday-special {
      background: #050505;
      padding: 8px;
      vertical-align: top;
    }
    .friday-stack {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 8px;
    }
    .friday-company {
      height: calc(55.5556% - 6px);
    }
    .friday-primary {
      height: calc(22.2222% - 5px);
      border-top: 1px solid var(--grid);
      padding-top: 8px;
    }
    .friday-pre {
      height: calc(16.6667% - 5px);
      border-top: 1px solid var(--grid);
      padding-top: 8px;
    }
    @media (max-width: 800px) {
      .wrap { padding: 12px; }
      thead th { font-size: 16px; }
    }
  </style>
</head>

  </div>

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function assessmentForAge(item, age) {
      if (!item) return '';
      const minAge = Number(item.minAge);
      const maxAge = Number(item.maxAge);
      if (age < minAge || age > maxAge) return '';
      const type = String(item.assessmentType || '').toLowerCase();
      const note = String(item.assessmentNote || '').toLowerCase().replaceAll('–', '-');
      if (type === 'full') return 'orange';
      if (type !== 'conditional') return 'yellow';

      const exact = note.match(/age\s+(\d+)/);
      if (exact) {
        return age === Number(exact[1]) ? 'orange' : 'yellow';
      }

      const range = note.match(/ages?\s+(\d+)\s*-\s*(\d+)/);
      if (range) {
        const lo = Number(range[1]);
        const hi = Number(range[2]);
        return (age >= lo && age <= hi) ? 'orange' : 'yellow';
      }

      return 'orange';
    }

    function buildHeader() {
      const row = document.getElementById('headerRow');
      row.innerHTML = data.headers.map(h => `<th>${escapeHtml(h || '')}</th>`).join('');
    }

    function buildAgeOptions() {
      const select = document.getElementById('ageSelect');
      for (let age = 2; age <= 18; age++) {
        const option = document.createElement('option');
        option.value = String(age);
        option.textContent = String(age);
        select.appendChild(option);
      }
      select.addEventListener('change', (e) => renderTable(e.target.value));
    }

    function renderTable(selectedAge='') {
      const age = selectedAge ? Number(selectedAge) : null;
      const tbody = document.getElementById('timetableBody');
      const fridayIndex = data.headers.indexOf('Friday');
      let html = '';
      let skipFridayRows = 0;

      function getFridayItem(title) {
        for (const row of data.rows) {
          const cell = row[fridayIndex];
          if (cell && cell.type === 'class' && String(cell.displayTitle || '').trim() === title) {
            return cell.csvItem;
          }
        }
        return null;
      }

      const companyItem = getFridayItem('Company Rehearsals');
      const highlandItem = getFridayItem('Pre-Premier Highland');

      for (let rowIndex = 0; rowIndex < data.rows.length; rowIndex++) {
        const row = data.rows[rowIndex];
        const timeText = String(row[0].text || '').trim();
        const normalizedTime = timeText.replace(/\s+/g, '');

        // Remove the two blank spreadsheet rows entirely
        if (!timeText) {
          continue;
        }

        html += '<tr>';

        row.forEach((cell, idx) => {
          if (idx === 0) {
            html += `<th class="time">${escapeHtml(cell.text || '')}</th>`;
            return;
          }

          if (idx === fridayIndex && skipFridayRows > 0) {
            skipFridayRows -= 1;
            return;
          }

          const isFridayStackStart =
            idx === fridayIndex &&
            normalizedTime === '3:30PM-4:15PM';

          if (isFridayStackStart) {
            const companyColor = age && companyItem ? assessmentForAge(companyItem, age) : '';
            const highlandColor = age && highlandItem ? assessmentForAge(highlandItem, age) : '';

            html += `
              <td class="slot friday-special" rowspan="5">
                <div class="friday-stack">
                  <div class="class-box friday-company ${companyColor}">
                    <div class="class-title">${escapeHtml(companyItem ? companyItem.title : 'Company Rehearsals')}</div>
                  </div>
                  <div class="class-box friday-primary ${highlandColor}">
                    <div class="class-title">${escapeHtml(highlandItem ? highlandItem.title : 'Pre-Premier Highland')}</div>
                  </div>
                </div>
              </td>
            `;
            skipFridayRows = 4;
            return;
          }

          if (cell.type === 'empty') {
            html += '<td class="slot empty"></td>';
            return;
          }

          const item = cell.csvItem;
          const color = age && item ? assessmentForAge(item, age) : '';
          html += `
            <td class="slot">
              <div class="class-box ${color}">
                <div class="class-title">${cell.displayTitle === 'Intermediate/Advanced Ballet' ? 'Intermediate/<br>Advanced Ballet' : escapeHtml(cell.displayTitle)}</div>
              </div>
            </td>
          `;
        });

        html += '</tr>';
      }

      tbody.innerHTML = html;
    }

    buildHeader();
    buildAgeOptions();
    renderTable();
  </script>
