<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caledonia Timetable Mobile</title>
  <style>
    :root {
      --bg: #000000;
      --panel: #0f0f0f;
      --grid: #303030;
      --text: #f5f5f5;
      --muted: #cfcfcf;
      --yellow: #f2c200;
      --orange: #f28c28;
      --header-text: #000000;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }

    label {
      font-weight: 700;
      font-size: 18px;
    }

    select {
      background: #111;
      color: #fff;
      border: 1px solid #555;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      width: 100%;
      max-width: 220px;
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .swatch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .chip {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      display: inline-block;
      border: 1px solid #555;
    }

    .chip.black { background: var(--panel); }
    .chip.yellow { background: var(--yellow); }
    .chip.orange { background: var(--orange); }

    .day-block {
      border: 1px solid var(--grid);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 18px;
      background: #050505;
    }

    .day-header {
      background: var(--yellow);
      color: var(--header-text);
      font-weight: 700;
      font-size: 22px;
      padding: 14px 16px;
    }

    .class-row {
      padding: 10px;
      border-top: 1px solid var(--grid);
      background: #050505;
    }

    .class-box {
      background: var(--panel);
      color: var(--text);
      border: 1px solid #444;
      border-radius: 12px;
      padding: 14px 14px;
      min-height: 76px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .class-box.yellow {
      background: var(--yellow);
      color: #000000;
      border-color: var(--yellow);
    }

    .class-box.orange {
      background: var(--orange);
      color: #000000;
      border-color: var(--orange);
    }

    .class-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .class-time {
      font-size: 15px;
      line-height: 1.35;
      opacity: 0.95;
    }

    .empty-note {
      padding: 14px 16px;
      color: var(--muted);
      font-size: 15px;
      border-top: 1px solid var(--grid);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <label for="ageSelect">Select age:</label>
      <select id="ageSelect">
        <option value="">Choose age</option>
      </select>

        <span class="swatch"><span class="chip black"></span> Not eligible</span>
        <span class="swatch"><span class="chip yellow"></span> Eligible without assessment</span>
        <span class="swatch"><span class="chip orange"></span> Eligible after assessment</span>
      </div>
    </div>

    <div id="daysContainer"></div>
  </div>

    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

    function needsAssessmentForAge(item, age) {
      if (age < Number(item.minAge) || age > Number(item.maxAge)) return false;

      const assessmentType = String(item.assessmentType || '').toLowerCase();
      if (assessmentType === 'full') return true;
      if (assessmentType !== 'conditional') return false;

      const note = String(item.assessmentNote || '').toLowerCase().replaceAll('–', '-');

      const exactAgeMatch = note.match(/age\s+(\d+)/);
      if (exactAgeMatch) {
        return age === Number(exactAgeMatch[1]);
      }

      const rangeMatch = note.match(/ages?\s+(\d+)\s*-\s*(\d+)/);
      if (rangeMatch) {
        const min = Number(rangeMatch[1]);
        const max = Number(rangeMatch[2]);
        return age >= min && age <= max;
      }

      return true;
    }

    function getHighlightClass(item, selectedAge) {
      if (!selectedAge) return '';
      const age = Number(selectedAge);
      if (age < Number(item.minAge) || age > Number(item.maxAge)) return '';
      return needsAssessmentForAge(item, age) ? 'orange' : 'yellow';
    }

    function displayTitle(title) {
      return title === 'Intermediate/Advanced Ballet'
        ? 'Intermediate/<br>Advanced Ballet'
        : title;
    }

    function renderDays(selectedAge='') {
      const container = document.getElementById('daysContainer');
      let html = '';

      for (const day of days) {
        const dayClasses = classes.filter(item => item.day === day);

        html += `<section class="day-block">`;
        html += `<div class="day-header">${day}</div>`;

        if (!dayClasses.length) {
          html += `<div class="empty-note">No classes</div>`;
        } else {
          for (const item of dayClasses) {
            const color = getHighlightClass(item, selectedAge);
            html += `
              <div class="class-row">
                <div class="class-box ${color}">
                  <div class="class-title">${displayTitle(item.title)}</div>
                  <div class="class-time">${item.timeLabel}</div>
                </div>
              </div>
            `;
          }
        }

        html += `</section>`;
      }

      container.innerHTML = html;
    }

    function populateAges() {
      const select = document.getElementById('ageSelect');
      for (let age = 2; age <= 18; age++) {
        const option = document.createElement('option');
        option.value = age;
        option.textContent = age;
        select.appendChild(option);
      }

      select.addEventListener('change', (e) => {
        renderDays(e.target.value);
      });
    }

    populateAges();
    renderDays();
  </script>
</body>
